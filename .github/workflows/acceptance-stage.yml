name: Acceptance Stage
on:
  workflow_run:
    workflows: ['Commit Stage']
    types: [completed]
    branches: main
concurrency: acceptance

permissions:
  contents: read

jobs:
  functional:
    name: Functional Acceptance Tests
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Running functional acceptance tests"
  performance:
    name: Performance Tests
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Running performance tests"
  security:
    name: Security Tests
    runs-on: ubuntu-24.04
    steps:
      - run: echo "Running security tests"
  deliver:
    name: Delivery to Staging
    needs: [ functional, performance, security ]
    uses: ./.github/workflows/delivery.yml
    with:
      target: 'staging'
      owner: 'thomasvitale'
      deploy_repo: 'kubecon-eu-2026-gitops'
      registry: 'ghcr.io'
      app_repo: developers-nightmare
      version: ${{ github.sha }}
    secrets:
      dispatch_token: ${{ secrets.DISPATCH_TOKEN }}
