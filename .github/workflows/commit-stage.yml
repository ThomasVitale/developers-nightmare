name: Commit Stage

on:
  push:
    branches:
      - main
    paths-ignore:
      - '.editorconfig'
      - '.gitattributes'
      - '.gitignore'
      - '.sdkmanrc'
      - '*.adoc'
      - '*.png'
      - '*.md'
      - '*.txt'
      - 'catalog-info.yaml'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/*.md'
      - '.github/*.yml'
      - '.github/*.yaml'
  pull_request:
    branches:
      - main

env:
  FLOX_DISABLE_METRICS: true
  REGISTRY: ghcr.io
  IMAGE: thomasvitale/developers-nightmare
  VERSION: ${{ github.sha }}

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Flox
        uses: flox/install-flox-action@9428713e8d3883274c334b4b95b8830beebd24d2 # v2.3.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Compile and test
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: ./gradlew build --no-daemon
  
  package:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: Package
    runs-on: ubuntu-24.04
    needs: [build]
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Flox
        uses: flox/install-flox-action@9428713e8d3883274c334b4b95b8830beebd24d2 # v2.3.0

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@748248ddd2a24f49513d8f472f81c3a07d4d50e1 # v4.4.4

      - name: Login to Docker
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ${{ env.REGISTRY }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Build and publish AMD64 OCI image
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: |
            ./gradlew bootBuildImage --imageName ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-amd64 --imagePlatform linux/amd64
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-amd64

      - name: Build and publish ARM64 OCI image
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: |
            ./gradlew bootBuildImage --imageName ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-arm64 --imagePlatform linux/arm64
            docker push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-arm64

      - name: Build and publish multi-arch OCI image
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: |
            docker manifest create ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }} \
              --amend ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-amd64 \
              --amend ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}-arm64
            docker manifest push ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }}

      - name: Sign OCI image
        uses: flox/activate-action@410568008895a0f2e09a34bbd9523f8ef1f2d292 # v1.1.0
        with:
          command: |
            IMAGE_DIGEST=$(skopeo inspect docker://${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.VERSION }} | jq -r '.Digest')
            echo "IMAGE_DIGEST=$IMAGE_DIGEST" >> $GITHUB_ENV
            echo "Signing image: ${{ env.REGISTRY }}/${{ env.IMAGE }}@$IMAGE_DIGEST"
            cosign sign --yes ${{ env.REGISTRY }}/${{ env.IMAGE }}@$IMAGE_DIGEST
      
      - name: Attest OCI image
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE }}
          subject-digest: ${{ env.IMAGE_DIGEST }}
          push-to-registry: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
